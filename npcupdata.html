<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>謝爾夏｜NPC 設定／裏設定（管理員修改）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --blue: #1767a0;
      --soft: #eef2fa;
      --text: #1d4076;
      --warn: #f66464;
      --danger: #e74c3c;
      --bg: #f4f7fa;
      --border: #dcdfe6;
    }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 2rem;
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: auto;
      background: #fff;
      border-radius: 1.2rem;
      box-shadow: 0 2px 16px #0001;
      padding: 1.35rem 1.25rem;
    }

       h2 {
      margin: 0.2rem 0 0.2rem;
      font-size: large;
    }

    h3 {
      margin: 1.25rem 0 0.75rem;
      color: var(--text);
    }

    .sub {
      color: #3d648d;
      margin-bottom: 1rem;
      font-weight: 700;
      font-size: xx-large;
    }

    .msg {
      min-height: 1.2em;
      margin: 0.5rem 0;
    }

    .cc-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem 1rem;
      margin: 0.8rem 0 1.2rem;
    }

    .cc-field label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .cc-field input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 0.65rem;
      background: #f7f9fd;
      font-family: inherit;
      font-size: 1rem;
    }

    .help {
      margin: 0.5rem 0 1rem;
      padding: 0.8rem 1rem;
      border-radius: 0.85rem;
      background: rgba(29, 64, 118, 0.08);
      color: #495079;
      line-height: 1.7;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin: 0.6rem 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--soft);
      color: var(--text);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill input {
      margin: 0;
    }

    textarea {
      flex: 1;
      min-height: 72px;
      padding: 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.65rem;
      background: #f7f9fd;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      box-sizing: border-box;
    }

    .btns {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      justify-content: flex-end;
    }

    button {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 0.65rem;
      padding: 0.58rem 0.98rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .ghost {
      background: #d7e4f5;
      color: #1d4076;
    }

    .warn {
      background: var(--warn);
    }

    .del {
      background: var(--danger);
      align-self: stretch;
      min-width: 4.5rem;
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
      }

      .cc-grid {
        grid-template-columns: 1fr;
      }

      .row {
        display: block;
        padding: 0.75rem;
        border: 1px solid rgba(29, 64, 118, 0.12);
        border-radius: 0.85rem;
        background: #fbfdff;
      }

      .pill {
        margin-bottom: 0.55rem;
      }

      textarea {
        width: 100%;
      }

      .del {
        width: 100%;
        margin-top: 0.55rem;
      }

      .btns button {
        width: 100%;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="wrap">
    <h2>NPC 設定／裏設定（管理員修改）</h2>
    <div class="sub">NPC：<span id="npcName">載入中…</span></div>
    <div class="msg" id="msg"></div>

    <h3>NPC 能力設定</h3>

    <div class="cc-grid">
      <div class="cc-field">
        <label for="attack_cc">攻擊CC</label>
        <input type="number" id="attack_cc" min="0" step="1" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="cc-field">
        <label for="dodge_cc">閃避CC</label>
        <input type="number" id="dodge_cc" min="0" step="1" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="cc-field">
        <label for="cover_cc">掩護CC</label>
        <input type="number" id="cover_cc" min="0" step="1" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="cc-field">
        <label for="take_cc">擋刀CC</label>
        <input type="number" id="take_cc" min="0" step="1" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>

    <h3>NPC 設定／裏設定</h3>

    <div class="help">
      可多條，可設定是否顯示在卡片上。<br>
      請自行在設定新增角色CC。<br>
      例：<br>
      本角色的能力為<br>
      攻擊CC 70　　掩護CC 45<br>
      閃避CC 70　　擋刀CC 20
    </div>

    <div id="noteList"></div>

    <div class="btns">
      <button class="ghost" id="btnAdd" type="button">＋ 新增一條</button>
      <button class="warn" id="btnSave" type="button">儲存並返回</button>
      <button class="ghost" id="btnBack" type="button">取消返回</button>
    </div>
  </div>

  <script>
    const client = window.supabase.createClient(
      'https://wfhwhvodgikpducrhgda.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmaHdodm9kZ2lrcGR1Y3JoZ2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwMTAwNjEsImV4cCI6MjA2MzU4NjA2MX0.P6P-x4SxjiR4VdWH6VFgY_ktgMac_OzuI4Bl7HWskz8'
    );

    const $ = id => document.getElementById(id);

    let OTHERNPC_ID = null;
    let notes = [];

    function setMsg(text, bad = false) {
      $('msg').innerHTML = text
        ? `<span style="color:${bad ? '#d44' : '#1767a0'}">${escapeHTML(text)}</span>`
        : '';
    }

    function qs(key) {
      return new URL(location.href).searchParams.get(key);
    }

    function getNpcIdFromUrl() {
      return qs('othernpc_id') || qs('npc_id') || qs('id') || '';
    }

    function escapeHTML(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function goBack() {
      if (document.referrer) {
        location.href = document.referrer;
        return;
      }

      location.href = 'npc_manage';
    }

    function readNonNegativeInteger(id) {
      const el = $(id);
      const value = el ? el.value : '';

      if (value === '') {
        return 0;
      }

      const number = Number(value);

      if (!Number.isInteger(number) || number < 0) {
        throw new Error('CC 欄位只能填寫 0 或正整數');
      }

      return number;
    }

    function setNumberValue(id, value) {
      const el = $(id);
      if (!el) return;
      el.value = Number.isInteger(Number(value)) && Number(value) >= 0 ? Number(value) : 0;
    }

    async function checkAdmin() {
      let session = null;

      try {
        const sessionResult = await client.auth.getSession();
        session = sessionResult && sessionResult.data ? sessionResult.data.session : null;
      } catch (error) {
        alert('讀取登入狀態失敗');
        location.href = 'https://shierusha.github.io/login/login';
        return false;
      }

      const sessionPlayerId = session && session.user ? session.user.id : '';
      const sessionEmail = session && session.user ? session.user.email : '';
      const localPlayerId = localStorage.getItem('player_id') || '';

      let playerData = null;

      if (localPlayerId) {
        const result = await client
          .from('players')
          .select('player_id,role,username,email')
          .eq('player_id', localPlayerId)
          .maybeSingle();

        if (result.data) {
          playerData = result.data;
        }
      }

      if (!playerData && sessionPlayerId) {
        const result = await client
          .from('players')
          .select('player_id,role,username,email')
          .eq('player_id', sessionPlayerId)
          .maybeSingle();

        if (result.data) {
          playerData = result.data;
        }
      }

      if (!playerData && sessionEmail) {
        const result = await client
          .from('players')
          .select('player_id,role,username,email')
          .eq('email', sessionEmail)
          .maybeSingle();

        if (result.data) {
          playerData = result.data;
        }
      }

      if (!playerData) {
        alert('查無玩家資料，請重新登入');
        location.href = 'https://shierusha.github.io/login/login';
        return false;
      }

      if (playerData.role !== 'admin') {
        alert('你不是管理員，無權進入');
        location.href = 'https://shierusha.github.io/login/login';
        return false;
      }

      localStorage.setItem('player_id', playerData.player_id);
      localStorage.setItem('player_role', playerData.role);
      localStorage.setItem('player_username', playerData.username || '');

      return true;
    }

    async function loadAll() {
      try {
        setMsg('載入中…');

        const npcResult = await client
          .from('other_npcs')
          .select('othernpc_id,name,attack_cc,dodge_cc,cover_cc,take_cc')
          .eq('othernpc_id', OTHERNPC_ID)
          .single();

        if (npcResult.error || !npcResult.data) {
          alert('查無此 NPC');
          goBack();
          return;
        }

        const npc = npcResult.data;

        $('npcName').textContent = npc.name || '(未命名)';

        setNumberValue('attack_cc', npc.attack_cc ?? 0);
        setNumberValue('dodge_cc', npc.dodge_cc ?? 0);
        setNumberValue('cover_cc', npc.cover_cc ?? 0);
        setNumberValue('take_cc', npc.take_cc ?? 0);

        const notesResult = await client
          .from('othernpc_notes')
          .select('content,is_public,sort_order')
          .eq('othernpc_id', OTHERNPC_ID)
          .order('sort_order');

        notes = (notesResult.data || [])
          .slice()
          .sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0))
          .map(note => ({
            content: note.content || '',
            is_public: !!note.is_public,
            sort_order: note.sort_order ?? 0
          }));

        if (!notes.length) {
          notes = [{ content: '', is_public: true, sort_order: 10 }];
        }

        renderList();
        setMsg('');
      } catch (error) {
        console.error(error);
        setMsg('載入失敗：' + (error && error.message ? error.message : error), true);
      }
    }

    function renderList() {
      const box = $('noteList');
      box.innerHTML = '';

      notes.forEach((note, index) => {
        const row = document.createElement('div');
        row.className = 'row';

        row.innerHTML = `
          <label class="pill">
            <input type="checkbox" ${note.is_public ? 'checked' : ''}>
            顯示
          </label>
          <textarea placeholder="請輸入 NPC 設定／裏設定">${escapeHTML(note.content || '')}</textarea>
          <button type="button" class="del">刪除</button>
        `;

        const checkbox = row.querySelector('input[type="checkbox"]');
        const textarea = row.querySelector('textarea');
        const deleteButton = row.querySelector('.del');

        checkbox.onchange = function () {
          note.is_public = checkbox.checked;
        };

        textarea.oninput = function () {
          note.content = textarea.value;
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
        };

        deleteButton.onclick = function () {
          if (notes.length <= 1) return;
          notes.splice(index, 1);
          renderList();
        };

        if (notes.length <= 1) {
          deleteButton.disabled = true;
        }

        box.appendChild(row);

        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      });
    }

    function addNote() {
      const maxSort = notes.reduce((max, note) => Math.max(max, note.sort_order ?? 0), 0);

      notes.push({
        content: '',
        is_public: true,
        sort_order: maxSort + 10
      });

      renderList();
    }

    async function saveAll() {
      try {
        setMsg('儲存中…');

        const attackCc = readNonNegativeInteger('attack_cc');
        const dodgeCc = readNonNegativeInteger('dodge_cc');
        const coverCc = readNonNegativeInteger('cover_cc');
        const takeCc = readNonNegativeInteger('take_cc');

        const updateResult = await client
          .from('other_npcs')
          .update({
            attack_cc: attackCc,
            dodge_cc: dodgeCc,
            cover_cc: coverCc,
            take_cc: takeCc
          })
          .eq('othernpc_id', OTHERNPC_ID);

        if (updateResult.error) {
          throw new Error('NPC 能力設定儲存失敗：' + updateResult.error.message);
        }

        notes.forEach((note, index) => {
          note.sort_order = (index + 1) * 10;
        });

        const deleteResult = await client
          .from('othernpc_notes')
          .delete()
          .eq('othernpc_id', OTHERNPC_ID);

        if (deleteResult.error) {
          throw new Error('刪除舊設定失敗：' + deleteResult.error.message);
        }

        const rows = notes
          .map(note => ({
            othernpc_id: OTHERNPC_ID,
            content: String(note.content || '').trim(),
            is_public: !!note.is_public,
            sort_order: note.sort_order
          }))
          .filter(note => note.content);

        if (rows.length > 0) {
          const insertResult = await client
            .from('othernpc_notes')
            .insert(rows);

          if (insertResult.error) {
            throw new Error('NPC 設定寫入失敗：' + insertResult.error.message);
          }
        }

        setMsg('儲存完成');
        goBack();
      } catch (error) {
        console.error(error);
        setMsg('儲存失敗：' + (error && error.message ? error.message : error), true);
      }
    }

    $('btnAdd').onclick = addNote;
    $('btnBack').onclick = goBack;
    $('btnSave').onclick = saveAll;

    document.addEventListener('DOMContentLoaded', async function () {
      const adminOk = await checkAdmin();

      if (!adminOk) {
        return;
      }

      OTHERNPC_ID = getNpcIdFromUrl();

      if (!OTHERNPC_ID) {
        alert('缺少 othernpc_id');
        goBack();
        return;
      }

      await loadAll();
    });
  </script>
</body>
</html>
